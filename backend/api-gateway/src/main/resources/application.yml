server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          max-request-size: 10MB
          routes:
            - id: payment-service
              uri: http://payment-service:8080
              predicates:
                - Path=/api/payment/**
 

            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/api/user/**


            - id: transaction-service
              uri: http://transaction-service:8080
              predicates:
                - Path=/api/transaction/**

            - id: wallet-service
              uri: http://wallet-service:8080
              predicates:
                - Path=/api/wallet/**

            - id: payment-service-api-docs
              uri:  http://payment-service:8080
              predicates:
                - Path=/aggregate/payment-service/api-docs
              filters:
                - RewritePath=/aggregate/payment-service/api-docs, /api-docs

            - id: wallet-service-api-docs
              uri: http://wallet-service:8080
              predicates:
                - Path=/aggregate/wallet-service/api-docs
              filters:
                - RewritePath=/aggregate/wallet-service/api-docs, /api-docs

            - id: user-service-api-docs
              uri: http://user-service:8080
              predicates:
                - Path=/aggregate/user-service/api-docs
              filters:
                - RewritePath=/aggregate/user-service/api-docs, /api-docs	
                    
            -  id: transaction-service-api-docs
               uri: http://transaction-service:8080
               predicates:
                  - Path=/aggregate/transaction-service/api-docs
               filters:
                  - RewritePath=/aggregate/transaction-service/api-docs, /api-docs
                
          
          globalcors:
              cors-configurations:
                "[/**]":
                  allowedOrigins: 
                    - http://localhost:4200
                    - https://your-payment.vercel.app
                    - http://127.0.0.1:4200

                  allowedMethods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - OPTIONS
                    - PATCH
                  allowedHeaders: "*"
                  allowCredentials: true


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /aggregate/user-service/api-docs
      - name: Transaction Service
        url: /aggregate/transaction-service/api-docs
      - name: Wallet Service
        url: /aggregate/wallet-service/api-docs
      - name: Payment Service
        url: /aggregate/payment-service/api-docs
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.cloud.gateway.handler: TRACE
