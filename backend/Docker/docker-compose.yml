version: "3.8"

services:
    postgres:
        image: postgres:15
        container_name: postgres
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5433:5432"
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
            - postgres_data:/var/lib/postgresql/data
        networks:
            - Library-net
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 5s
            timeout: 5s
            retries: 5

    keycloak-db:
        image: postgres:15
        container_name: keycloak-db
        restart: always
        environment:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: keycloak
        volumes:
            - keycloak_db_data:/var/lib/postgresql/data
        networks:
            - Payment-net

    keycloak:
        image: quay.io/keycloak/keycloak:24.0.1
        container_name: keycloak
        command:
            - start-dev
            - --spi-theme-cache-themes=false
            - --spi-theme-cache-templates=false
        restart: always
        depends_on:
            - keycloak-db
        environment:
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: keycloak
            KC_HOSTNAME: localhost
            KC_HOSTNAME_PORT: 8181
            KC_HOSTNAME_STRICT: "false"
            KC_HTTP_ENABLED: "true"
        ports:
            - "8181:8080"
        networks:
            - Payment-net
        volumes:
            - ../keycloak-themes:/opt/keycloak/themes

    broker:
        image: apache/kafka:latest
        container_name: broker
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
        networks:
            - Payment-net

    schema-registry:
        image: confluentinc/cp-schema-registry:7.5.0
        container_name: schema-registry
        ports:
            - "9091:8081"
        environment:
            SCHEMA_REGISTRY_HOST_NAME: schema-registry
            SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:9092
            SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
        depends_on:
            - broker
        networks:
            - Payment-net

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        ports:
            - "8085:8080"
        environment:
            - KAFKA_CLUSTERS_0_NAME=local
            - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=broker:9092
        depends_on:
            - broker
        networks:
            - Payment-net

    user-service:
        build:
            context: ..
            dockerfile: user-service/Dockerfile
        container_name: user-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8085:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Payment-net

    transaction-service:
        build:
            context: ..
            dockerfile: transaction-Service/Dockerfile
        container_name: author-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transactionservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8084:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Payment-net

    api-gateway:
        build:
            context: ..
            dockerfile: api-gateway/Dockerfile
        container_name: api-gateway
        restart: on-failure
        environment:
            SPRING_APPLICATION_NAME: api-gateway
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8081:8080"
        depends_on:
            - keycloak
        networks:
            - Payment-net

    payment-service:
        build:
            context: ..
            dockerfile: payment-service/Dockerfile
        container_name: payment-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8083:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Payment-net

    notification-service:
        build:
            context: ..
            dockerfile: notification-service/Dockerfile
        container_name: notification-service
        restart: on-failure
        environment:
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8082:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Payment-net

    wallet-service:
        build:
            context: ..
            dockerfile: wallet-service/Dockerfile
        container_name: wallet-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/walletservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8082:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Payment-net

networks:
    Payment-net:
        driver: bridge
