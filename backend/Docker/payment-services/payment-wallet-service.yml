version: "3.8"

services:
  wallet-service:
    build:
      context: ../..
      dockerfile: wallet-service/Dockerfile
    container_name: payment-wallet-service
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/walletservice_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/Payment-realm/protocol/openid-connect/certs
      SYSTEM_ACC_ID: 123456789
    ports:
      - "8082:8080"
    networks:
      - Payment-net

networks:
  Payment-net:
    external: true
