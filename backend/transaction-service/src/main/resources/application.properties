spring.application.name=transaction-service


System.acc.id = ${system-account-Id}


#Kafka config
spring.kafka.bootstrap-servers=broker:9092
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.schema.registry.url=http://schema-registry:8081
spring.kafka.producer.properties.spring.json.trusted.packages=com.emi.events
spring.kafka.consumer.group-id=TransactionService


#database config
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.hibernate.ddl-auto=none
spring.flyway.baseline-on-migrate=true
spring.jpa.properties.hibernate.jdbc.time_zone= UTC

#swagger config
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/api-docs

